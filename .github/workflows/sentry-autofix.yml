name: Daily Sentry Codex Review

on:
  schedule:
    # GitHub cron uses UTC. 06:50 UTC is 12:20 Asia/Kolkata.
    - cron: '50 6 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: Optional IST report date (YYYY-MM-DD)
        required: false
        type: string
      max_issues:
        description: Maximum issues to analyze (1-20)
        required: false
        default: '10'
        type: string

concurrency:
  group: daily-sentry-codex-review
  cancel-in-progress: false

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_changes: ${{ steps.capture.outputs.has_changes }}
      issue_count: ${{ steps.sentry.outputs.issue_count }}
      report_date: ${{ steps.window.outputs.report_date }}
    env:
      REPORT_DATE_INPUT: ${{ inputs.report_date }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select completed IST window and deduplicate
        id: window
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "$REPORT_DATE_INPUT" ]]; then
            report_date="$REPORT_DATE_INPUT"
          elif [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            report_date="$(date -u +%F)"
          else
            report_date="$(TZ=Asia/Kolkata date +%F)"
          fi

          if [[ ! "$report_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Report date must use YYYY-MM-DD format."
            exit 1
          fi

          branch="codex/sentry-daily-$report_date"
          existing_pr="$(gh pr list --state all --head "$branch" --json number --jq 'length')"
          if [[ "$existing_pr" != "0" ]] || git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "A branch or PR already exists for the $report_date Sentry review."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"

      - name: Fetch sanitized daily Sentry context
        if: steps.window.outputs.should_run == 'true'
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG_SLUG: ${{ vars.SENTRY_ORG_SLUG }}
          SENTRY_PROJECTS: ${{ vars.SENTRY_PROJECTS }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
          SENTRY_DAILY_LEVELS: ${{ vars.SENTRY_DAILY_LEVELS }}
          SENTRY_DAILY_MAX_ISSUES: ${{ inputs.max_issues || vars.SENTRY_DAILY_MAX_ISSUES || '10' }}
          SENTRY_REPORT_DATE: ${{ steps.window.outputs.report_date }}
        run: node .github/scripts/fetch-sentry-daily-context.mjs

      - name: Report an empty daily window
        if: steps.window.outputs.should_run == 'true' && steps.sentry.outputs.issue_count == '0'
        run: cat .sentry-daily-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node.js
        if: steps.window.outputs.should_run == 'true' && steps.sentry.outputs.issue_count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            backend/yarn.lock

      - name: Install dependencies
        if: steps.window.outputs.should_run == 'true' && steps.sentry.outputs.issue_count != '0'
        run: |
          yarn install --frozen-lockfile
          yarn --cwd backend install --frozen-lockfile

      - name: Run Codex once for the daily issue batch
        if: steps.window.outputs.should_run == 'true' && steps.sentry.outputs.issue_count != '0'
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/sentry-autofix.md
          output-file: codex-output.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          effort: medium
          codex-args: '["--ephemeral"]'

      - name: Capture combined proposed patch
        if: steps.window.outputs.should_run == 'true' && steps.sentry.outputs.issue_count != '0'
        id: capture
        run: |
          artifact_dir="/tmp/sentry-daily-autofix"
          mkdir -p "$artifact_dir"
          mv codex-output.md "$artifact_dir/codex-output.md"
          mv .sentry-daily-summary.md "$artifact_dir/sentry-summary.md"
          rm -f .sentry-daily-context.md

          git add -N .
          git diff --binary > "$artifact_dir/sentry-autofix.patch"

          patch_size="$(wc -c < "$artifact_dir/sentry-autofix.patch")"
          if (( patch_size > 1048576 )); then
            echo "Codex patch exceeds the 1 MiB safety limit."
            exit 1
          fi

          if [[ -s "$artifact_dir/sentry-autofix.patch" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            cat "$artifact_dir/sentry-summary.md" >> "$GITHUB_STEP_SUMMARY"
            cat "$artifact_dir/codex-output.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload combined proposed patch
        if: steps.capture.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sentry-daily-${{ steps.window.outputs.report_date }}
          path: /tmp/sentry-daily-autofix/
          retention-days: 7

  publish:
    needs: autofix
    if: needs.autofix.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    env:
      REPORT_DATE: ${{ needs.autofix.outputs.report_date }}
      ISSUE_COUNT: ${{ needs.autofix.outputs.issue_count }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download combined proposed patch
        uses: actions/download-artifact@v4
        with:
          name: sentry-daily-${{ env.REPORT_DATE }}
          path: /tmp/sentry-daily-autofix

      - name: Apply and validate proposed patch
        run: |
          patch_file="/tmp/sentry-daily-autofix/sentry-autofix.patch"
          git apply --check "$patch_file"
          node .github/scripts/validate-autofix-changes.mjs "$patch_file"
          git apply "$patch_file"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: |
            yarn.lock
            backend/yarn.lock

      - name: Install dependencies
        run: |
          yarn install --frozen-lockfile
          yarn --cwd backend install --frozen-lockfile

      - name: Verify combined fixes
        run: |
          yarn build
          yarn test:unit
          yarn --cwd backend build

      - name: Create one daily draft pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="codex/sentry-daily-$REPORT_DATE"
          title="fix: daily Sentry review $REPORT_DATE"
          report="/tmp/sentry-daily-autofix/codex-output.md"
          summary="/tmp/sentry-daily-autofix/sentry-summary.md"
          body="/tmp/sentry-daily-autofix/pr-body.md"

          git config user.name "codex-autofix[bot]"
          git config user.email "codex-autofix[bot]@users.noreply.github.com"
          gh auth setup-git
          git switch -c "$branch"
          git add .
          git commit -m "$title"
          git push origin "HEAD:$branch"

          {
            printf 'Automated combined review of %s Sentry issue(s) for the 24-hour window ending at 12:20 PM IST on %s.\n\n' "$ISSUE_COUNT" "$REPORT_DATE"
            cat "$summary"
            printf '\n## Codex analysis\n\n'
            head -c 10000 "$report"
            printf '\n\n## Verification\n\n- `yarn build`\n- `yarn test:unit`\n- `yarn --cwd backend build`\n\n'
            printf 'This draft PR was generated automatically and requires human review before merge.\n'
          } > "$body"

          gh pr create \
            --draft \
            --base "${{ github.event.repository.default_branch }}" \
            --head "$branch" \
            --title "$title" \
            --body-file "$body"
