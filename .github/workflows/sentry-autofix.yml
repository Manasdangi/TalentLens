name: Daily Sentry Report for Codex

on:
  schedule:
    # GitHub cron uses UTC. 06:50 UTC is 12:20 Asia/Kolkata.
    - cron: '50 6 * * *'
  workflow_dispatch:
    inputs:
      report_date:
        description: Optional IST report date (YYYY-MM-DD)
        required: false
        type: string
      max_issues:
        description: Maximum issues to report (1-20)
        required: false
        default: '10'
        type: string

concurrency:
  group: daily-sentry-report
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      issue_count: ${{ steps.sentry.outputs.issue_count }}
      report_date: ${{ steps.window.outputs.report_date }}
    env:
      REPORT_DATE_INPUT: ${{ inputs.report_date }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Select completed IST window
        id: window
        run: |
          if [[ -n "$REPORT_DATE_INPUT" ]]; then
            report_date="$REPORT_DATE_INPUT"
          elif [[ "$GITHUB_EVENT_NAME" == "schedule" ]]; then
            report_date="$(date -u +%F)"
          else
            report_date="$(TZ=Asia/Kolkata date +%F)"
          fi

          if [[ ! "$report_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Report date must use YYYY-MM-DD format."
            exit 1
          fi

          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"

      - name: Fetch sanitized daily Sentry context
        id: sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG_SLUG: ${{ vars.SENTRY_ORG_SLUG }}
          SENTRY_PROJECTS: ${{ vars.SENTRY_PROJECTS }}
          SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT }}
          SENTRY_DAILY_LEVELS: ${{ vars.SENTRY_DAILY_LEVELS }}
          SENTRY_DAILY_MAX_ISSUES: ${{ inputs.max_issues || vars.SENTRY_DAILY_MAX_ISSUES || '10' }}
          SENTRY_REPORT_DATE: ${{ steps.window.outputs.report_date }}
        run: node .github/scripts/fetch-sentry-daily-context.mjs

      - name: Report an empty daily window
        if: steps.sentry.outputs.issue_count == '0'
        run: cat .sentry-daily-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized report
        if: steps.sentry.outputs.issue_count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: sentry-daily-report-${{ steps.window.outputs.report_date }}
          path: .sentry-daily-issue.md
          include-hidden-files: true
          retention-days: 3

  publish-report:
    needs: collect
    if: needs.collect.outputs.issue_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    env:
      REPORT_DATE: ${{ needs.collect.outputs.report_date }}
      ISSUE_COUNT: ${{ needs.collect.outputs.issue_count }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download sanitized report
        uses: actions/download-artifact@v4
        with:
          name: sentry-daily-report-${{ env.REPORT_DATE }}
          path: /tmp/sentry-daily-report

      - name: Create one daily GitHub issue
        run: |
          report_label="sentry-daily-review"
          reviewed_label="codex-reviewed"
          title="[Sentry] Daily review $REPORT_DATE"
          body="/tmp/sentry-daily-report/.sentry-daily-issue.md"

          gh label create "$report_label" \
            --color "B60205" \
            --description "Sanitized daily production telemetry for Codex review" \
            --force
          gh label create "$reviewed_label" \
            --color "0E8A16" \
            --description "Daily Sentry report reviewed by Codex" \
            --force

          existing_issue="$(
            gh issue list \
              --state all \
              --label "$report_label" \
              --limit 100 \
              --json number,title \
              --jq ".[] | select(.title == \"$title\") | .number" \
              | head -n 1
          )"

          if [[ -n "$existing_issue" ]]; then
            echo "Issue #$existing_issue already contains the $REPORT_DATE report." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          issue_url="$(gh issue create --title "$title" --label "$report_label" --body-file "$body")"
          printf 'Published [%s](%s) with %s qualifying Sentry issue(s).\n' \
            "$title" "$issue_url" "$ISSUE_COUNT" >> "$GITHUB_STEP_SUMMARY"
